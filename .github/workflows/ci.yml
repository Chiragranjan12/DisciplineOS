name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      
      - name: Run Maven tests
        working-directory: discipline-os-api
        run: mvn test
      
      - name: Build backend
        working-directory: discipline-os-api
        run: mvn package -DskipTests

  build-frontend:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: discipline-os/package-lock.json
      
      - name: Install dependencies
        working-directory: discipline-os
        run: npm install
      
      - name: Build frontend
        working-directory: discipline-os
        run: npm run build