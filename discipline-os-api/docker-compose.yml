version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: disciplineos-db
    environment:
      POSTGRES_DB: ${DB_NAME:-disciplineos}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - disciplineos-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME:-disciplineos}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  disciplineos-data:
    name: disciplineos-data