spring:
  application:
    name: disciplineos-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/disciplineos
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

application:
  security:
    jwt:
      # Set JWT_SECRET env var in production. Dev fallback is provided below.
      secret-key: ${JWT_SECRET:ZGlzY2lwbGluZW9zLWRldi1zZWNyZXQta2V5LXRoaXMtaXMtYXQtbGVhc3QtMjU2LWJpdHMhISE=}
      expiration: 86400000
      refresh-token:
        expiration: 604800000
  cors:
    # Comma-separated list of allowed origins. Override in production.
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
